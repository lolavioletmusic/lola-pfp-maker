<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const upload = document.getElementById('upload');
const zoom = document.getElementById('zoom');

const frame = new Image();
frame.src = 'framebutterfly.png';

let userImg = null,
    scale = 1,
    x = 0,
    y = 0,
    dragging = false,
    lastX = 0,
    lastY = 0;

function draw() {
  ctx.clearRect(0, 0, 1080, 1080);

  ctx.fillStyle = '#0b0730';
  ctx.fillRect(0, 0, 1080, 1080);

  ctx.save();

  ctx.beginPath();
  ctx.arc(540, 540, 390, 0, Math.PI * 2);
  ctx.clip();

  if (userImg) {
    const base = Math.max(
      1080 / userImg.width,
      1080 / userImg.height
    ) * scale;

    const w = userImg.width * base;
    const h = userImg.height * base;

    ctx.drawImage(
      userImg,
      540 - w / 2 + x,
      540 - h / 2 + y,
      w,
      h
    );
  } else {
    ctx.fillStyle = '#140737';
    ctx.fillRect(0, 0, 1080, 1080);

    ctx.fillStyle = 'rgba(255,255,255,.8)';
    ctx.font = 'bold 42px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Upload your photo', 540, 520);
  }

  ctx.restore();

  if (frame.complete) {
    ctx.drawImage(frame, 0, 0, 1080, 1080);
  }
}

frame.onload = draw;
draw();

upload.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;

  const img = new Image();

  img.onload = () => {
    userImg = img;
    scale = 1;
    zoom.value = 1;
    x = 0;
    y = 0;
    draw();
  };

  img.src = URL.createObjectURL(file);
});

zoom.addEventListener('input', () => {
  scale = parseFloat(zoom.value);
  draw();
});

function pos(e) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;

  return {
    x: (t.clientX - r.left) * 1080 / r.width,
    y: (t.clientY - r.top) * 1080 / r.height
  };
}

function start(e) {
  dragging = true;
  const p = pos(e);
  lastX = p.x;
  lastY = p.y;
}

function move(e) {
  if (!dragging) return;

  e.preventDefault();

  const p = pos(e);

  x += p.x - lastX;
  y += p.y - lastY;

  lastX = p.x;
  lastY = p.y;

  draw();
}

function end() {
  dragging = false;
}

canvas.addEventListener('mousedown', start);
window.addEventListener('mousemove', move);
window.addEventListener('mouseup', end);

canvas.addEventListener('touchstart', start, { passive: false });
window.addEventListener('touchmove', move, { passive: false });
window.addEventListener('touchend', end);

document.getElementById('download').addEventListener('click', () => {
  draw();

  const a = document.createElement('a');
  a.download = 'lola-violet-pfp.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});
</script>
